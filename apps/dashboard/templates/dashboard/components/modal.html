<!-- Reusable modal component -->
<div class="modal fade" id="{{ modal_id|default:'dashboard-modal' }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog {{ modal_size|default:'modal-lg' }}">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{{ modal_title|default:'Modal' }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body-{{ modal_id|default:'dashboard-modal' }}">
                {% block modal_content %}
                <p>Modal content goes here...</p>
                {% endblock %}
            </div>
            {% if not hide_footer %}
            <div class="modal-footer">
                {% block modal_footer %}
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Save changes</button>
                {% endblock %}
            </div>
            {% endif %}
        </div>
    </div>
</div>
